name: secrets-scan

# The pre-commit gitleaks hook (.pre-commit-config.yaml) only runs on a
# developer machine and can be skipped with `git commit --no-verify`. This
# workflow is the server-side backstop docs/security-requirements.md already
# claimed existed -- it didn't, until this file.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history -- gitleaks scans past commits too
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
