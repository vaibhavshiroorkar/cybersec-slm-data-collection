name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync (all base deps + dev group)
        run: uv sync

      - name: Ruff
        run: uv run ruff check src tests

      - name: Tests
        run: uv run pytest -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # gitleaks needs full history to scan commits

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync (dev group)
        run: uv sync

      - name: pip-audit (supply-chain)
        # Fails the build on any real dependency vulnerability (pip-audit's default
        # exit-1 behavior). We deliberately drop --strict because it ALSO fails on
        # packages it cannot audit, which here are only first-party / non-PyPI
        # artifacts, not supply-chain risks:
        #   - the editable local project (handled by --skip-editable)
        #   - the spaCy model en-core-web-lg (installed from a URL, not on PyPI)
        # PYSEC-2022-252 (deep-translator): 2022 account-takeover advisory with no
        # fixed version. 1.11.4 is the latest release, the malicious artifact was
        # removed from PyPI, and osv.dev does not flag 1.11.4 -- ignored deliberately.
        run: uv run pip-audit --desc --skip-editable --ignore-vuln PYSEC-2022-252

      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
