name: credential-expiry-check

# Runs tools/check_credential_expiry.py on a schedule so a credential nearing
# (or past) its expires_at gets caught by CI instead of by a scraper silently
# failing. Requires a repo secret SOPS_AGE_KEY holding the *private* age key
# that can decrypt secrets/credentials.enc.yaml -- add it under
# Settings > Secrets and variables > Actions. Never echo its value anywhere.

on:
  schedule:
    - cron: "0 9 * * 1"   # every Monday, 09:00 UTC
  workflow_dispatch: {}    # allow a manual run

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install sops + PyYAML
        run: |
          curl -sLo /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.9.4/sops-v3.9.4.linux.amd64
          chmod +x /usr/local/bin/sops
          pip install pyyaml

      - name: Check credential expiry
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: python tools/check_credential_expiry.py
