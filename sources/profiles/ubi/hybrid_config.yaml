# ---------------------------------------------------------------------------
# API Backends
# ---------------------------------------------------------------------------
api_backends:
  pattern:
    enabled: true
    # No limits needed — generates URLs deterministically

  huggingface:
    enabled: true
    per_keyword_limit: 300
    country_signal_keywords:
      - india
      - rbi
      - upi
      - sebi
      - gst
      - pmla
      - nbfc
      - npa
      - hindi
      - bengali
      - sangraha
      - samvaad
      - bharat

  github:
    enabled: true
    per_keyword_limit: 150
    token_env: GITHUB_TOKEN
    country_signal_keywords:
      - india
      - indian
      - rbi
      - upi
      - sebi
      - gst
      - nbfc
      - pmla

  arxiv:
    enabled: true
    per_keyword_limit: 80
    country_signal_keywords:
      - india
      - indian
      - rbi
      - upi
      - sebi
      - pmla
      - nbfc

  ckan:
    enabled: true
    base_url: "https://www.data.gov.in"
    api_key_env: DATAGOVINDIA_API_KEY
    country: India
    license: "Government Open Data License - India (GODL)"

  searxng:
    enabled: true
    url: "http://localhost:8080"
    engines: "github,arxiv,openairedatasets,semantic scholar"
    per_keyword_limit: 25
    max_pages: 4
    country_signal_keywords:
      - india
      - rbi
      - sebi
      - upi

# ---------------------------------------------------------------------------
# Quality Rules
# ---------------------------------------------------------------------------
quality:
  min_relevance_score: 0.20    # lower threshold since many India-gov URLs have sparse metadata
  reject_off_topic_hosts: true
  reject_listing_pages: true

  # Any of these in title/description → row is penalised
  off_topic_signals:
    - "chest x-ray"
    - "medical imaging"
    - "genomic"
    - "drone swarm"
    - "counterinsurgency"
    - "climate change"
    - "weather forecast"
    - "electoral"
    - "voter"
    - "recipe"
    - "cooking"

  # Presence of any of these → relevance score boost
  domain_signals:
    - banking
    - finance
    - audit
    - compliance
    - fraud
    - risk
    - rbi
    - sebi
    - kyc
    - aml
    - basel
    - nbfc
    - npa
    - pmla
    - upi
    - fema
    - irdai
    - sebi
    - loan
    - credit
    - insolvency
    - monetary
    - regulatory
    - governance
    - treasury
    - capital
    - provisioning
    - liquidity

  # These hosts are always blocked (social/junk)
  blocked_hosts:
    - pinterest.com
    - facebook.com
    - twitter.com
    - x.com
    - instagram.com
    - tiktok.com
    - youtube.com
    - reddit.com
    - quora.com
    - medium.com

  # These hosts are always trusted (skip relevance check)
  trusted_hosts:
    - huggingface.co
    - github.com
    - arxiv.org
    - data.gov.in
    - rbi.org.in
    - sebi.gov.in
    - fiuindia.gov.in
    - mca.gov.in
    - ibbi.gov.in
    - npci.org.in
    - irdai.gov.in
    - enforcementdirectorate.gov.in
    - drt.gov.in
    - unionbankofindia.bank.in
    - indiacode.nic.in
    - egazette.gov.in
