    - "Indian bank stress testing"
    - "priority sector lending India RBI"
    - "SARFAESI act India banking"
    - "insolvency bankruptcy India IBC"
    - "FEMA foreign exchange India violation"
    - "regulatory compliance NLP dataset"
    - "bank risk management India dataset github"
    - "credit default prediction India"
    - "loan default India dataset"
    - "liquidity coverage ratio Indian bank"
    - "operational risk loss event dataset"

  Internal Audit:
    - "internal audit banking India"
    - "bank concurrent audit India"
    - "long form audit report India RBI"
    - "statutory audit Indian bank"
    - "fraud monitoring India bank"
    - "internal control Indian banking"
    - "risk based internal audit India"
    - "audit findings dataset banking"
    - "bank inspection RBI India"
    - "information systems audit bank India"
    - "audit workpaper corpus dataset"
    - "process mining audit event log dataset"

  Corporate Governance:
    - "corporate governance Indian listed company"
    - "SEBI LODR disclosure India"
    - "board of directors Indian bank"
    - "related party transactions India bank"
    - "insider trading India SEBI"
    - "annual report Indian bank corpus"
    - "ESG sustainability report India bank"
    - "director appointment India RBI"
    - "shareholder pattern dataset India"
    - "compensation policy India bank"
    - "Companies Act 2013 India"
    - "whistle blower policy India bank"
    - "SEBI enforcement order India"

# ---------------------------------------------------------------------------
# URL Patterns — deterministic generation, no network calls
# ---------------------------------------------------------------------------
url_patterns:
  # RBI Notifications (real range: covers all significant circulars)
  - template: "https://www.rbi.org.in/Scripts/NotificationUser.aspx?Id={id}"
    id_range: [8000, 12500]
    subdomain: Compliance and Risk Management
    country: India
    license: "First-party (owner-authorized)"
    description_template: "RBI Notification/Circular ID {id} – banking regulation"
    category: Document
    fmt: HTML
    author: rbi.org.in
    note: "RBI circular – generated from notification ID range"

  # SEBI Orders archive (adjudication/settlement/consent orders)
  - template: "https://www.sebi.gov.in/enforcement/orders/{year}/{month}/order_{n:03d}.html"
    subdomain: AML-KYC
    country: India
    license: "First-party (owner-authorized)"
    description_template: "SEBI enforcement order {n:03d} for {month} {year}"
    category: Document
    fmt: HTML
    author: sebi.gov.in
    note: "SEBI enforcement order – generated from year/month matrix"
    items:
      - {year: 2020, month: jan, n: 1}
