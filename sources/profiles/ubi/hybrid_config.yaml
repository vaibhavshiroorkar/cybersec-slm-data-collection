# hybrid_config.yaml – Indian Banking Compliance / SLM Pre-training
#
# This YAML fully describes the sourcing situation for the UBI profile.
# Run with:
#   uv run cybersec-slm hybrid-source --config sources/profiles/ubi/hybrid_config.yaml
#
# Dry-run (no writes):
#   uv run cybersec-slm hybrid-source --config ... --dry-run
#
# Test first 100 rows:
#   uv run cybersec-slm hybrid-source --config ... --limit 100

profile:
  name: indian_banking_compliance
  field: Finance
  target: 10000
  output_csv: sources/profiles/ubi/Sources.csv
  default_tags: "India;banking;compliance;SLM-pretrain"
  country_bias:
    India: 0.65
    Global: 0.35

subdomains:
  - AML-KYC
  - Compliance and Risk Management
  - Internal Audit
  - Corporate Governance

# ---------------------------------------------------------------------------
# Keywords — per subdomain, used by HuggingFace, GitHub, arXiv, SearXNG
# ---------------------------------------------------------------------------
keywords:
  AML-KYC:
    - "RBI KYC norms India banking"
    - "money laundering India PMLA detection"
    - "UPI payment fraud detection India"
    - "financial fraud India dataset"
    - "suspicious transaction reporting India"
    - "AML transaction monitoring dataset India"
    - "know your customer India bank"
    - "FATCA reporting India"
    - "Enforcement Directorate PMLA India"
    - "hawala detection India"
    - "GST fraud detection India"
    - "beneficial ownership India bank"
    - "politically exposed persons India"
    - "sanctions screening India"
    - "FIU India financial intelligence"
    - "anti money laundering dataset github"
    - "financial crime detection dataset huggingface"
    - "synthetic AML transaction dataset"

  Compliance and Risk Management:
    - "RBI circular Basel III India bank"
    - "NBFC regulatory compliance India"
