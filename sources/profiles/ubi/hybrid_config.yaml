api_backends:
  pattern:
    enabled: true
    # id_range/items below are guesses, not a confirmed listing (RBI/SEBI
    # don't publish a sequential index we can be sure is fully populated) —
    # verify checks each generated URL actually resolves before it's kept.
    # This was previously off, which is why ~44% of a prior catalog run was
    # unverified RBI URLs, an unknown share of which likely 404 or point to
    # circulars outside the assigned Sub-Domain.
    verify: true
    verify_workers: 20
    verify_timeout: 6.0

  huggingface:
    enabled: true
    per_keyword_limit: 300
    country_signal_keywords: [india, rbi, upi, sebi, gst, pmla, nbfc, npa, hindi, bengali, sangraha, samvaad, bharat]

  # Unauthenticated GitHub search is 10 req/min and this backend sleeps 6s
  # between pages to stay under that — set $GITHUB_TOKEN in the environment
  # (not in this file) to raise it to 30 req/min and drop the sleep to 1s.
  github:
    enabled: true
    per_keyword_limit: 150
    token_env: GITHUB_TOKEN
    country_signal_keywords: [india, indian, rbi, upi, sebi, gst, nbfc, pmla]

  arxiv:
    enabled: true
    per_keyword_limit: 80
    country_signal_keywords: [india, indian, rbi, upi, sebi, pmla, nbfc]

  ckan:
    enabled: true
    base_url: "https://www.data.gov.in"
    api_key_env: DATAGOVINDIA_API_KEY
    country: India
    license: "Government Open Data License - India (GODL)"

  searxng:
    enabled: true
    url: "http://localhost:8080"
    engines: "github,arxiv,openairedatasets,semantic scholar"
    per_keyword_limit: 25
    max_pages: 4
    # engines above are already restricted to the API-based ones that aren't
    # CAPTCHA-walled (see sourcing/README.md), so the old blanket 1s pause
    # between every page can be trimmed without getting throttled.
    sleep_seconds: 0.4
    country_signal_keywords: [india, rbi, sebi, upi]

quality:
  min_relevance_score: 0.20    # lower threshold since many India-gov URLs have sparse metadata
  # Independent floor on the keyword-match component alone. Previously a row
  # from a trusted host (github.com, huggingface.co, rbi.org.in, ...) could
  # clear min_relevance_score on host trust (0.30 weight) alone even with
  # ZERO domain-signal words in its title/description — i.e. host trust could
  # fully substitute for topical relevance. This requires at least a little
  # real textual evidence even from trusted hosts. Note this does not catch
  # the pattern-backend's template boilerplate text (e.g. "banking
  # regulation" baked into every RBI row) — that's what pattern.verify is for.
  min_keyword_score: 0.08
  reject_off_topic_hosts: true
  reject_listing_pages: true
  # ... (off_topic_signals / domain_signals / blocked_hosts / trusted_hosts unchanged)