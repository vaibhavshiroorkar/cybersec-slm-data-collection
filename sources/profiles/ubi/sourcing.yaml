# Sourcing settings for the `ubi` profile (Indian banking / regulatory compliance).
#
# This is the ONE config the sourcing engine reads. The taxonomy — sub-domains,
# keywords, enum codes, vocab, and restricted hosts — stays in `keywords.yaml`
# (every stage reads it). Anything omitted here falls back to taxonomy-derived
# defaults, so a partial file is valid.

target:
  total: 8000            # global cap on new rows added per run
  per_subdomain: 2000    # top each sub-domain up to this many commercial-valid rows

country:
  # `bias` aims the *queries*: 65% of each sub-domain's keywords get "India"
  # appended before they are sent to the backends. This is the half that actually
  # produces Indian sources — a filter alone only discards what came back.
  bias: {India: 0.65, Global: 0.35}
  # `filter` is the hard gate: a row whose classified Country is not India is
  # dropped (counted in the funnel's "wrong country" bucket). Setting it also
  # overrides `bias` for targeting — every query is aimed at India, because a shot
  # aimed elsewhere would only produce rows this filter then throws away.
  # Set to null to keep all countries.
  filter: India
  # Extra substrings that mark a row as belonging to a country, on top of the
  # built-ins (.in ccTLD, rbi, sebi, npci, gst, ...). Add the institutions this
  # corpus cares about so they are recognised on .org/.com hosts too.
  hints:
    India:
      - reserve bank
      - union bank of india
      - nabard
      - sidbi
      - indian banks association
      - securities and exchange board of india
      - insolvency and bankruptcy board
      - national payments corporation
      - pmla
      - fema
      - basel iii india
      - indiacode
      - nic.in

license:
  policy: real_or_unknown          # keep a real (metadata) license or Unknown; never fabricate
  enrich_unknown: true             # fetch a real license for Unknown rows before keeping
  allow_owned_first_party: false   # do NOT admit self-asserted first-party/owner stamps
  # "flag", not "drop": a restricted host is admitted with a BLANK License and the
  # restriction reason in its Note, and the ingestion license gate then fetches the
  # actual URL and decides. rbi.org.in is the motivating case — the site's prose is
  # all-rights-reserved, but its RSS feed reduces to a metadata index the gate
  # already allows, and dropping the whole host at sourcing time made that
  # distinction unreachable. Nothing is fetched or trained on until ingestion
  # clears it; this only stops the catalog from hiding the source.
  restricted_policy: flag

# restricted_hosts is inherited from keywords.yaml (rbi.org.in, sebi.gov.in, ...).
# Uncomment to add profile-specific bars on top of the taxonomy's:
# restricted_hosts:
#   - some-bank.example.in

verify_liveness: true    # HTTP-check non-API (e.g. SearXNG) URLs before keeping
workers: 12              # enrichment thread-pool size

backends:
  # Real-metadata APIs first (license comes straight from the source):
  ckan:
    enabled: true
    per_keyword_limit: 100
    base_url: https://www.data.gov.in
    api_key_env: DATAGOVINDIA_API_KEY
    # data.gov.in is wholly GODL-India (a genuine portal fact) — used only when a
    # package exposes no license of its own; never as a per-URL guess.
    license: Government Open Data License - India (GODL)
    country: India
  huggingface:
    enabled: true
    per_keyword_limit: 100
  kaggle:
    enabled: true            # needs KAGGLE_USERNAME + KAGGLE_KEY; degrades to no-op without
    per_keyword_limit: 50
  zenodo:
    enabled: true            # optional ZENODO_TOKEN raises the rate limit
    per_keyword_limit: 50
  github:
    enabled: true            # set GITHUB_TOKEN to raise the rate limit
    per_keyword_limit: 80
    token_env: GITHUB_TOKEN
  arxiv:
    enabled: true
    per_keyword_limit: 50
  # Broad reach, lowest signal, no license metadata — runs only after the others:
  searxng:
    enabled: true
    url: http://localhost:8080
    engines: github,arxiv,openairedatasets,semantic scholar
    per_keyword_limit: 25
    last_resort: true

quality:
  # A candidate must carry at least this many of its sub-domain's vocab terms
  # (aml, kyc, money laundering, basel, npa, ...) in its title/description.
  # Raise to 2 if noise persists; 0 disables the check.
  min_keyword_hits: 1
  # ...but only for these backends. The dataset APIs (kaggle/huggingface/github)
  # are already bound to the query and have terse titles: measured on real output,
  # applying the floor to them dropped 5 of 12 genuinely on-topic rows, including
  # the Elliptic set. The broad scientific/web backends are where the off-subject
  # results actually come from. Set to [] to apply the floor everywhere.
  relevance_backends: [zenodo, arxiv, searxng]
  # Dropped outright when the word appears in the title/description. These are the
  # off-subject clusters this corpus actually attracts from the science/data hosts.
  off_topic_signals:
    - covid
    - sars-cov
    - genome
    - genomic
    - protein
    - molecular
    - taxonomy of
    - sp. nov
    - astronomy
    - astrophysic
    - earthquake
    - seismic
    - soil
    - crop yield
    - medical imaging
    - mri
    - drone
