# Dashboard theme — a security-operations console. The finer styling (fonts,
# instrument tiles, status pills) is injected as CSS by dashboard/theme.py; these
# keys set the base Streamlit palette so widgets match without extra overrides.
[theme]
base = "dark"
primaryColor = "#38BDF8"
backgroundColor = "#0E1522"
secondaryBackgroundColor = "#16202F"
textColor = "#E6EDF5"
font = "sans serif"

[server]
# Local-first monitor; opt into wide use by pointing the data root elsewhere.
headless = false
